version: '3.8'

services:
  alpine-test:
    image: alpine:3.22
    container_name: alpine-test
    hostname: alpine-test
    ports:
      - "2222:22"
    command: >
      sh -c " apk add --no-cache openssh && ssh-keygen -A && echo 'root:testpass' | chpasswd && /usr/sbin/sshd -D "
    volumes:
      - test-data:/tmp
    networks:
      - test-network

volumes:
  test-data:


networks:
  test-network:
    driver: bridge
